# Spark Configuration for EU Budget Pipeline
# File: config/spark_config.conf
# Purpose: PySpark settings for distributed data processing

# Application Configuration
spark.app.name=EU_Budget_Anomaly_Detection
spark.master=local[*]

# Memory Configuration
spark.driver.memory=4g
spark.executor.memory=2g
spark.driver.maxResultSize=2g

# Shuffle Configuration
spark.sql.shuffle.partitions=8
spark.shuffle.compress=true
spark.shuffle.spill.compress=true

# Serialization
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max=512m

# SQL Configuration
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.autoBroadcastJoinThreshold=10MB

# Databricks-specific settings (when running on Databricks)
spark.databricks.delta.preview.enabled=true
spark.databricks.delta.retentionDurationCheck.enabled=false

# Data Source Configuration
spark.sql.sources.partitionOverwriteMode=dynamic
spark.sql.parquet.compression.codec=snappy
spark.sql.csv.compression.codec=gzip

# Performance Tuning
spark.sql.execution.arrow.pyspark.enabled=true
spark.sql.execution.arrow.maxRecordsPerBatch=10000

# Unity Catalog Configuration
spark.databricks.unityCatalog.enabled=true
spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog

# Logging
spark.eventLog.enabled=false
spark.ui.showConsoleProgress=true

# ML Configuration (for Isolation Forest)
spark.ml.clustering.kmeans.maxIter=100
spark.ml.clustering.kmeans.tol=1e-4

# Custom Application Settings
# Pipeline-specific configuration
spark.eu.budget.catalog.schema=eu-spending
spark.eu.budget.volume.name=eu-budget
spark.eu.budget.raw.data.folder=raw-budget-data
spark.eu.budget.output.folder=outputs

# Data Processing Parameters
spark.eu.budget.year.min=2000
spark.eu.budget.year.max=2024
spark.eu.budget.countries.count=28

# Anomaly Detection Parameters
spark.eu.budget.h1.zscore.threshold=2.0
spark.eu.budget.h3.contamination=0.05
spark.eu.budget.h3.n.estimators=100
spark.eu.budget.h3.random.state=42

# Feature Engineering
spark.eu.budget.features.lag.periods=3
spark.eu.budget.features.rolling.window=3
