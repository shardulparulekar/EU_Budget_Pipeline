# DuckDB Configuration for EU Budget Pipeline
# File: config/duckdb_config.ini
# Purpose: DuckDB settings for feature engineering stage

[database]
# Connection type (memory for speed, file for persistence)
connection_type = memory

[performance]
# Memory settings
memory_limit = 8GB
threads = 4
max_memory = 8GB
temp_directory = /tmp/duckdb_temp
worker_threads = 4

[features]
# Enable/disable DuckDB features
enable_object_cache = true
enable_profiling = false
preserve_insertion_order = true

[feature_engineering]
# Feature engineering parameters used in SQL queries
rolling_window_size = 3
lag_periods = 3
zscore_threshold = 2.0
base_year = 2000

# MFF period definitions
mff_2000_2006 = 2000-2006
mff_2007_2013 = 2007-2013
mff_2014_2020 = 2014-2020
mff_2021_2027 = 2021-2027

[data_quality]
# Quality check thresholds
max_missing_pct = 20.0
min_records_per_year = 50
duplicate_tolerance = 0.0
outlier_iqr_multiplier = 3.0

[output]
# Output formatting
decimal_precision = 4
date_format = YYYY-MM-DD
null_string = NULL
csv_delimiter = ,
parquet_compression = snappy
